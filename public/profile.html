<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <script src="[cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
<script>
  checkAuth();  // schützt vor unbefugtem Zugriff
</script>
</head>
<body class="p-6">
  <h1 class="text-3xl font-bold mb-6">Mein Profil</h1>
  <form id="form" class="space-y-4 max-w-lg">
    <input id="name" class="w-full p-2 border rounded" placeholder="Name"/>
    <input id="voice" class="w-full p-2 border rounded" placeholder="Stimmgruppe"/>
    <input id="address" class="w-full p-2 border rounded" placeholder="Adresse"/>
    <input id="phone" class="w-full p-2 border rounded" placeholder="Telefon"/>
    <button type="button"
      onclick="saveProfile()"
      class="w-full p-3 bg-blue-500 text-white rounded">
      Speichern
    </button>
  </form>
<script>
async function load() {
  checkAuth();
  const p = await getProfile();
  if (!p) return;
  document.getElementById("name").value = p.name || "";
  document.getElementById("voice").value = p.voice || "";
  document.getElementById("address").value = p.address || "";
  document.getElementById("phone").value = p.phone || "";
}
async function saveProfile() {
  await updateProfile({
    name: name.value,
    voice: voice.value,
    address: address.value,
    phone: phone.value,
  });
  alert("Gespeichert!");
}
load();
</script>
</body>
</html>
