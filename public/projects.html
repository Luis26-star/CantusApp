<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <head>
  <meta charset="UTF-8">

  <!-- 1️⃣ Tailwind Config (ZUERST!) -->
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            cantus: {
              light: "#E6F2FF",
              primary: "#1976D2",
              dark: "#0D47A1",
              accent: "#FFC107",
              danger: "#D32F2F",
              success: "#388E3C"
            }
          }
        }
      }
    }
  </script>

  <!-- 2️⃣ Tailwind Script (DAS ist Tailwind!) -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>
</head>

<body class="p-8">

<h1 class="text-3xl font-bold mb-4">Projekte</h1>

<div id="projectList" class="space-y-3">
  <!-- Projekte werden hier angezeigt -->
</div>

<!-- 🔧 LOKALE LOGIK (optional, erstmal Dummy) -->
<script type="module">

// 🔧 Dummy-Daten (später Supabase)
const projects = [
  { title: "Sommerkonzert 2026", status: "geplant" },
  { title: "Weihnachtskonzert", status: "in Vorbereitung" },
  { title: "Workshop Chorarbeit", status: "abgeschlossen" }
];

const container = document.getElementById("projectList");

projects.forEach(p => {
  const el = document.createElement("div");
  el.className = "p-4 bg-gray-100 rounded";

  el.innerHTML = `
    <div class="font-bold">${p.title}</div>
    <div class="text-sm text-gray-600">${p.status}</div>
  `;

  container.appendChild(el);
});

</script>

<!-- 🔥 HAUPTSYSTEM -->
<script type="module" src="/js/main.js"></script>

</body>
</html>
