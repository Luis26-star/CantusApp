<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
<head>
  <meta charset="UTF-8">

  <!-- 1️⃣ Tailwind Config (ZUERST!) -->
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            cantus: {
              light: "#E6F2FF",
              primary: "#1976D2",
              dark: "#0D47A1",
              accent: "#FFC107",
              danger: "#D32F2F",
              success: "#388E3C"
            }
          }
        }
      }
    }
  </script>

  <!-- 2️⃣ Tailwind Script (DAS ist Tailwind!) -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>
</head>

<body class="p-6">

<h1 class="text-3xl font-bold mb-6">Termine</h1>

<!-- 🔧 EVENTS LISTE -->
<div id="eventList"></div>

<!-- 🔧 EVENT FORM -->
<h2 class="text-xl mt-6">Neues Event</h2>

<form id="eventForm" class="mb-4">
  <input id="title" placeholder="Titel" class="border p-2 mr-2" />

  <!-- ✅ deutsches Datumsformat -->
  <input id="date" placeholder="TT.MM.JJJJ" class="border p-2 mr-2" />

  <button type="submit" class="bg-blue-500 text-white px-3 py-2">
    Speichern
  </button>
</form>

<script type="module" src="/js/main.js"></script>

</body>
</html>
