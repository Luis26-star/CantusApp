<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <script src="[cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
</head>
<body class="p-6">
  <h1 class="text-3xl font-bold mb-6">Termine</h1>
  <div id="events"></div>
<script>
async function loadEventsUI() {
  const events = await getEvents();
  const container = document.getElementById("events");
  events.forEach(e => {
    const el = document.createElement("div");
    el.className = "p-4 mb-3 bg-gray-50 border rounded";
    el.innerHTML = `
      <div class="text-xl font-bold">${e.title}</div>
      <div>Datum: ${e.date}</div>
      <button onclick="setAttendance('${e.id}', 'yes')" class="mt-3 px-3 py-2 bg-green-600 text-white rounded">
        Ja
      </button>
      <button onclick="setAttendance('${e.id}', 'no')" class="mt-3 px-3 py-2 bg-red-600 text-white rounded">
        Nein
      </button>
    `;
    container.appendChild(el);
  });
}
checkAuth();
loadEventsUI();
</script>
</body>
</html>
