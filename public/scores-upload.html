<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind Config -->
  <head>
  <meta charset="UTF-8">

  <!-- 1️⃣ Tailwind Config (ZUERST!) -->
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            cantus: {
              light: "#E6F2FF",
              primary: "#1976D2",
              dark: "#0D47A1",
              accent: "#FFC107",
              danger: "#D32F2F",
              success: "#388E3C"
            }
          }
        }
      }
    }
  </script>

  <!-- 2️⃣ Tailwind Script (DAS ist Tailwind!) -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>
</head>

<body class="p-6 bg-gray-50">

  <main class="max-w-xl mx-auto bg-white p-6 rounded shadow">

    <h1 class="text-2xl font-bold mb-4">PDF hochladen</h1>

    <input
      type="file"
      id="pdf"
      accept="application/pdf"
      class="mb-4 block w-full"
    />

    <button
      id="uploadBtn"
      class="px-4 py-2 bg-cantus-primary text-white rounded hover:opacity-90"
    >
      Hochladen
    </button>

    <p id="status" class="mt-4 text-sm text-gray-600"></p>

  </main>

  <script type="module" src="/js/upload.js"></script>

</body>
</html>
